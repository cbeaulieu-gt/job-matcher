# publish.yml — fixes #166
#
# Mirrors the private repo (cbeaulieu-gt/job-matcher-pr) to the
# public repo (cbeaulieu-gt/job-matcher).
#
# Prerequisites:
#   - A secret named PUBLIC_REPO_PAT must be set in the private repo's
#     Settings → Secrets and variables → Actions. The PAT must have
#     the "repo" write scope on both the public code repo and the
#     public wiki repo.
#
# Manual trigger (workflow_dispatch):
#   - Always pushes main + all tags to the public repo.
#   - Also syncs the wiki.
#   - Does NOT create a release (no tag context available).
#
# Automatic trigger:
#   - Any tag matching `v*` pushed to the private repo triggers this
#     workflow, pushes main + tags, syncs the wiki, and copies the
#     release notes to the public repo.

name: Publish to public repo

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push code to public repo
        run: |
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/cbeaulieu-gt/job-matcher.git
          git push public main --force
          git push public --tags --force

      - name: Sync wiki
        run: |
          git clone https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/cbeaulieu-gt/job-matcher-pr.wiki.git wiki
          cd wiki
          git remote add public https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/cbeaulieu-gt/job-matcher.wiki.git
          git push public master --force

      - name: Sync release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TITLE=$(gh release view "$TAG" --repo cbeaulieu-gt/job-matcher-pr --json name -q .name)
          BODY=$(gh release view "$TAG" --repo cbeaulieu-gt/job-matcher-pr --json body -q .body)
          gh release create "$TAG" \
            --repo cbeaulieu-gt/job-matcher \
            --title "$TITLE" \
            --notes "$BODY" || echo "Release may already exist — skipping"
