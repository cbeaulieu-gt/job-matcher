name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - refactor/split-app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dev dependencies
        run: uv pip install -r requirements-dev.txt --system

      - name: Run linter
        run: ruff check .

      - name: Enforce job_aggregator import isolation
        run: |
          # Only job_sources/aggregator_provider.py may import job_aggregator.
          # This step fails if any other .py file contains such an import.
          # Tests are exempt (grep -v tests/) since test files import
          # job_aggregator for fixtures and error-class assertions.
          VIOLATIONS=$(grep -rn 'from job_aggregator\|import job_aggregator' \
            --include='*.py' . \
            | grep -v 'job_sources/aggregator_provider.py' \
            | grep -v '__pycache__' \
            | grep -v 'tests/' \
            || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "ERROR: job_aggregator imported outside aggregator_provider.py:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "Import isolation check passed."

      - name: ShellCheck
        run: shellcheck scripts/*.sh

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobmatcher
          POSTGRES_PASSWORD: jobmatcher
          POSTGRES_DB: jobmatcher_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -r requirements.txt -r requirements-dev.txt --system

      - name: Run tests
        env:
          DATABASE_URL: postgresql://jobmatcher:jobmatcher@localhost:5432/jobmatcher_test
        run: pytest
