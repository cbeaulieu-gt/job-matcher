services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - FLASK_DEBUG=0
      - DB_PATH=/app/data/jobs.db

  scheduler:
    build: .
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
      - ./profile.json:/app/profile.json:ro
    env_file: .env
    environment:
      - DB_PATH=/app/data/jobs.db
    command: sh -c 'while true; do python ingest.py --hours 25; sleep 86400; done'
    depends_on:
      - web
