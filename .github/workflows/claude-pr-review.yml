name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Review this pull request. Post a comment with:
            1. A plain-language summary of what changed.
            2. Any bugs, edge cases, or regressions you spot.
            3. Suggestions for improvement (style, performance, maintainability).
            4. An overall verdict: approve, needs changes, or neutral.
            Keep the tone constructive and concise.
